name = "ava"
languages = ["typescript", "javascript"]

[detect]
dependency = "ava"

[[entry_points]]
glob = "test/**/*.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "tests/**/*.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "**/*.test.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "**/*.spec.{ts,tsx,js,jsx}"

[[config_patterns]]
glob = "ava.config.{js,cjs,mjs}"

tooling_dependencies = ["ava", "@ava/typescript"]
