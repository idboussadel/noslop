name = "vitest"
languages = ["typescript", "javascript"]

[detect]
any = [
  { dependency = "vitest" },
  { file_exists = "vitest.config.ts" },
  { file_exists = "vitest.config.js" },
  { file_exists = "vitest.config.mts" },
]

[[entry_points]]
glob = "**/*.test.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "**/*.spec.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "**/__tests__/**/*.{ts,tsx,js,jsx}"

[[entry_points]]
glob = "**/*.bench.{ts,tsx,js,jsx}"

[[config_patterns]]
glob = "**/vitest.config.{ts,js,mts,mjs}"

[[config_patterns]]
glob = "vitest.workspace.{ts,js}"

tooling_dependencies = ["vitest"]
