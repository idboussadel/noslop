name = "webpack"
languages = ["typescript", "javascript"]

[detect]
dependency = "webpack"

[[entry_points]]
glob = "src/index.{ts,tsx,js,jsx}"

[[config_patterns]]
glob = "webpack.config.{ts,js,mjs,cjs}"

[[config_patterns]]
glob = "webpack.*.config.{ts,js,mjs,cjs}"

[[config_patterns]]
glob = "webpack.config.{js,ts,mjs,cjs}"

tooling_dependencies = ["webpack", "webpack-cli", "webpack-dev-server", "html-webpack-plugin"]
